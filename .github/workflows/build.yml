name: Build design tokens

on:
  push:
    branches: [main]
    paths:
      - 'Mode 1.tokens.json'
      - 'style-dictionary.config.ts'
      - 'build.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'Mode 1.tokens.json'
      - 'style-dictionary.config.ts'
      - 'build.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build iOS tokens
        run: npm run build

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: design-tokens-ios
          path: build/ios/
          retention-days: 30
