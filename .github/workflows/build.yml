name: Build & sync design tokens to consumers

on:
  push:
    branches: [main]
    paths:
      - "primitive.json"
      - "semantic.json"
      - "component.json"
      - "$metadata.json"
      - "$themes.json"
      - "style-dictionary.config.ts"
      - "build.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "primitive.json"
      - "semantic.json"
      - "component.json"
      - "$metadata.json"
      - "$themes.json"
      - "style-dictionary.config.ts"
      - "build.ts"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
  workflow_dispatch: {}

concurrency:
  group: design-tokens-sync
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# 사용 전 사전 준비 (Settings → Secrets and variables → Actions):
#   • `IOS_REPO_DISPATCH_TOKEN`  — SWYP-Find/Picke-iOS Contents/PR write 권한 PAT
#   • `APP_REPO_DISPATCH_TOKEN`  — SWYP-Find/APP      Contents/PR write 권한 PAT
#   (두 레포 권한을 모두 가진 단일 PAT 으로 양쪽에 동일한 값을 등록해도 됨)
# ─────────────────────────────────────────────────────────────────────────────
env:
  IOS_REPO: SWYP-Find/Picke-iOS
  IOS_BASE_BRANCH: develop
  APP_REPO: SWYP-Find/APP
  APP_BASE_BRANCH: dev
  TARGET_BRANCH_PREFIX: chore/design-tokens-sync
  TOKENS_DEST_IOS_DIR: Projects/Shared/DesignSystem/Resources
  KOTLIN_DEST_APP: app/src/main/java/com/picke/app/ui/theme/tokens

jobs:
  validate:
    name: Validate (Style Dictionary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build (Style Dictionary)
        run: npm run build

      - name: Upload SD artifact
        uses: actions/upload-artifact@v4
        with:
          name: design-tokens-ios-sd
          path: build/ios/
          retention-days: 30

  sync-to-ios:
    name: Codegen & PR to Picke-iOS
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - name: Checkout design-tokens
        uses: actions/checkout@v4

      - name: Compute timestamped branch name
        id: branch
        run: |
          ts=$(date -u +'%Y%m%d-%H%M%S')
          name="${TARGET_BRANCH_PREFIX}-${ts}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "Auto-PR branch: ${name}"

      - name: Checkout target iOS repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IOS_REPO }}
          token: ${{ secrets.IOS_REPO_DISPATCH_TOKEN }}
          path: ios-repo
          ref: ${{ env.IOS_BASE_BRANCH }}
          fetch-depth: 0

      - name: Copy token JSON files into iOS repo
        run: |
          set -euo pipefail
          DEST="ios-repo/${TOKENS_DEST_IOS_DIR}"
          mkdir -p "${DEST}"
          # 구버전 단일 파일 제거 — 신규 generator 는 더 이상 읽지 않음
          rm -f "${DEST}/Mode 1.tokens.json"
          for f in primitive.json semantic.json component.json '$metadata.json' '$themes.json'; do
            cp "$f" "${DEST}/$f"
          done
          echo "[sync] copied 5 token files → ${DEST}/"

      - name: Run iOS codegen (Tools/TokenGenerator.swift) — 2차 검증
        working-directory: ios-repo
        run: |
          set -euo pipefail
          swift --version
          swift Tools/TokenGenerator.swift

      - name: Show generated diff
        working-directory: ios-repo
        run: |
          git status --short
          git --no-pager diff --stat || true

      - name: Open PR in Picke-iOS
        uses: peter-evans/create-pull-request@v6
        with:
          path: ios-repo
          token: ${{ secrets.IOS_REPO_DISPATCH_TOKEN }}
          base: ${{ env.IOS_BASE_BRANCH }}
          branch: ${{ steps.branch.outputs.name }}
          delete-branch: true
          title: "chore: design-tokens 자동 반영"
          commit-message: |
            chore: design-tokens 자동 반영

            source: ${{ github.repository }}@${{ github.sha }}
          labels: |
            design-tokens
            auto-generated
          body: |
            ## 자동 생성된 디자인 토큰 반영

            **Source**: [`${{ github.repository }}@${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Trigger**: `${{ github.event_name }}` on `${{ github.ref_name }}`
            **Workflow run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            **Branch**: `${{ steps.branch.outputs.name }}` → `${{ env.IOS_BASE_BRANCH }}`

            ### 두 단계 검증 통과
            - 1차: Style Dictionary v4 빌드 (DTCG `$type` / alias 정합성)
            - 2차: `Tools/TokenGenerator.swift` 실행 (실제 사용 Swift 코드 생성)

            ### 변경된 파일
            - `Projects/Shared/DesignSystem/Resources/{primitive,semantic,component,$metadata,$themes}.json`
            - `Projects/Shared/DesignSystem/Sources/Color/ShapeStyle+.swift`
            - `Projects/Shared/DesignSystem/Sources/Extension/CGFloat/CGFloat+Radius+.swift`
            - `Projects/Shared/DesignSystem/Sources/Extension/CGFloat/CGFloat+Spacing+.swift`
            - `Projects/Shared/DesignSystem/Sources/Extension/CGFloat/CGFloat+Component+.swift`
            - `Projects/Shared/DesignSystem/Sources/UI/Token/ComponentToken.swift`

            > 자동 생성된 PR. 토큰 변경 시마다 새 브랜치/새 PR 이 생성되며, 머지 시 브랜치는 자동 삭제됩니다.

  sync-to-android:
    name: Codegen & PR to APP (Compose)
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout design-tokens
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build Style Dictionary (Kotlin outputs)
        run: npm run build

      - name: Compute timestamped branch name
        id: branch
        run: |
          ts=$(date -u +'%Y%m%d-%H%M%S')
          name="${TARGET_BRANCH_PREFIX}-${ts}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "Auto-PR branch: ${name}"

      - name: Checkout target APP repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          token: ${{ secrets.APP_REPO_DISPATCH_TOKEN }}
          path: app-repo
          ref: ${{ env.APP_BASE_BRANCH }}
          fetch-depth: 0

      - name: Copy Kotlin tokens into APP repo
        run: |
          set -euo pipefail
          DEST="app-repo/${KOTLIN_DEST_APP}"
          mkdir -p "${DEST}"
          cp build/android/*.kt "${DEST}/"
          echo "[sync] copied $(ls build/android/*.kt | wc -l | tr -d ' ') Kotlin files → app-repo/${KOTLIN_DEST_APP}/"

      - name: Show generated diff
        working-directory: app-repo
        run: |
          git status --short
          git --no-pager diff --stat || true

      - name: Open PR in APP
        uses: peter-evans/create-pull-request@v6
        with:
          path: app-repo
          token: ${{ secrets.APP_REPO_DISPATCH_TOKEN }}
          base: ${{ env.APP_BASE_BRANCH }}
          branch: ${{ steps.branch.outputs.name }}
          delete-branch: true
          title: "chore: design-tokens 자동 반영"
          commit-message: |
            chore: design-tokens 자동 반영

            source: ${{ github.repository }}@${{ github.sha }}
          labels: |
            design-tokens
            auto-generated
          body: |
            ## 자동 생성된 디자인 토큰 반영 (Android / Compose)

            **Source**: [`${{ github.repository }}@${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Trigger**: `${{ github.event_name }}` on `${{ github.ref_name }}`
            **Workflow run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            **Branch**: `${{ steps.branch.outputs.name }}` → `${{ env.APP_BASE_BRANCH }}`

            ### 변경된 파일
            `app/src/main/java/com/picke/app/ui/theme/tokens/`
            - `BrandColorTokens.kt`
            - `SemanticColorTokens.kt`
            - `ComponentColorTokens.kt`
            - `ComponentNumberTokens.kt`
            - `SpacingTokens.kt`
            - `RadiusTokens.kt`

            ### 적용 가이드
            기존 `ui/theme/Color.kt` / `Spacing.kt` / `Type.kt` 와 별개의 신규 패키지로 생성됩니다.
            새 코드에서는 토큰 파일을 import해 사용하고, 기존 손코딩 정의는 점진적으로 마이그레이션하면 됩니다.

            ```kotlin
            import com.picke.app.ui.theme.tokens.BrandColorTokens
            import com.picke.app.ui.theme.tokens.SpacingTokens

            BrandColorTokens.primary500
            SpacingTokens.s16
            ```

            > 자동 생성된 PR. 토큰 변경 시마다 새 브랜치/새 PR 이 생성되며, 머지 시 브랜치는 자동 삭제됩니다.
